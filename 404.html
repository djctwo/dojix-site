<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Dojix</title>
    <meta name="theme-color" content="#0e0d0b">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0e0d0b;--surface:#141310;--card:#1c1b18;--border:rgba(255,220,160,0.08);--text:#e8e4dc;--muted:#9a9488;--accent:#e8b44c; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:'DM Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh; }
        main { flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px; }
        .error-code { font-family:'JetBrains Mono',monospace;font-size:clamp(80px,15vw,140px);font-weight:500;color:var(--accent);line-height:1;margin-bottom:16px;opacity:0.8; }
        h1 { font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:12px; }
        p { font-size:16px;color:var(--muted);margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto; }
        .links { display:flex;gap:16px;justify-content:center;flex-wrap:wrap; }
        .links a { color:var(--accent);text-decoration:none;font-size:15px;font-weight:500;padding:10px 24px;border:1px solid var(--border);border-radius:8px;transition:border-color 0.2s; }
        .links a:hover { border-color:var(--accent); }
        footer { border-top:1px solid var(--border);padding:24px;text-align:center;color:var(--muted);font-size:13px; }
        footer a { color:var(--muted);text-decoration:none; }
        footer a:hover { color:var(--text); }
        :focus-visible { outline:2px solid var(--accent);outline-offset:2px; }
    </style>
</head>
<body>
    <main>
        <div>
            <div class="error-code">404</div>
            <h1>Page not found</h1>
            <p>The page you're looking for doesn't exist or has been moved.</p>
            <div class="links">
                <a href="/">Home</a>
                <a href="/features/">Features</a>
                <a href="/support/">Support</a>
            </div>
        </div>
    </main>
    <footer>
        <a href="/">dojix.app</a>
    </footer>
</body>
</html>
