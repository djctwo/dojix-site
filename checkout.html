<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dojix — Checkout</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117; color: #c9d1d9;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .container { text-align: center; }
        .container h2 { margin-bottom: 8px; }
        .container p { color: #8b949e; font-size: 14px; }
        .error { color: #f85149; margin-top: 16px; font-size: 13px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Opening checkout...</h2>
        <p>The Paddle checkout overlay should appear momentarily.</p>
        <p class="error" id="error"></p>
    </div>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <script>
        var params = new URLSearchParams(window.location.search);
        var priceId = params.get('price_id');
        var machineId = params.get('machine_id');
        var errEl = document.getElementById('error');

        if (!priceId) {
            errEl.style.display = 'block';
            errEl.textContent = 'Missing price_id parameter.';
        } else {
            try {
                Paddle.Initialize({
                    token: 'live_e1682f25583561bd8cb11a1dc2c',
                    eventCallback: function(event) {
                        if (event.name === 'checkout.completed') {
                            var txnId = event.data && event.data.transaction_id ? event.data.transaction_id : '';
                            window.location.href = 'dojix://subscription/success?transaction_id=' + txnId;
                        }
                    }
                });
                Paddle.Checkout.open({
                    items: [{ priceId: priceId, quantity: 1 }],
                    customData: machineId ? { machine_id: machineId } : {}
                });
            } catch(e) {
                errEl.style.display = 'block';
                errEl.textContent = 'Checkout error: ' + e.message;
            }
        }
    </script>
</body>
</html>
