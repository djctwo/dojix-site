<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dojix — Checkout</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117; color: #c9d1d9;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .container { text-align: center; }
        .container h2 { margin-bottom: 8px; }
        .container p { color: #8b949e; font-size: 14px; }
        .error { color: #f85149; margin-top: 16px; font-size: 13px; display: none; }
        .success { display: none; margin-top: 24px; }
        .success h2 { color: #58a6ff; }
        .success p { color: #8b949e; font-size: 14px; margin: 8px 0; }
        .return-btn {
            display: inline-block; margin-top: 16px; padding: 12px 32px;
            background: #e8b44c; color: #0e0d0b; font-weight: 600; font-size: 16px;
            border: none; border-radius: 8px; cursor: pointer; text-decoration: none;
        }
        .return-btn:hover { background: #f0c060; }
        .txn-id { font-family: monospace; font-size: 12px; color: #6e7681; margin-top: 12px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container" id="checkout-state">
        <h2>Opening checkout...</h2>
        <p>The Paddle checkout overlay should appear momentarily.</p>
        <p class="error" id="error"></p>
    </div>
    <div class="success" id="success-state">
        <h2>Payment successful!</h2>
        <p>Click below to return to Dojix and activate your subscription.</p>
        <a class="return-btn" id="return-link" href="#">Return to Dojix</a>
        <p class="txn-id" id="txn-display"></p>
    </div>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <script>
        var ID_PATTERN = /^[a-zA-Z0-9_-]{1,128}$/;
        var params = new URLSearchParams(window.location.search);
        var priceId = params.get('price_id');
        var machineId = params.get('machine_id');
        var errEl = document.getElementById('error');

        function showError(msg) {
            errEl.style.display = 'block';
            errEl.textContent = msg;
        }

        if (!priceId || !ID_PATTERN.test(priceId)) {
            showError('Invalid or missing price_id parameter.');
        } else if (machineId && !ID_PATTERN.test(machineId)) {
            showError('Invalid machine_id parameter.');
        } else {
            // Detect Paddle CDN load failure
            var cdnTimeout = setTimeout(function() {
                if (typeof Paddle === 'undefined') {
                    showError('Checkout service failed to load. Please try again or contact support@dojix.app');
                }
            }, 8000);

            try {
                Paddle.Initialize({
                    token: 'live_e1682f25583561bd8cb11a1dc2c',
                    eventCallback: function(event) {
                        clearTimeout(cdnTimeout);
                        if (event.name === 'checkout.completed') {
                            var txnId = '';
                            if (event.data && typeof event.data.transaction_id === 'string' && ID_PATTERN.test(event.data.transaction_id)) {
                                txnId = event.data.transaction_id;
                            }
                            var deepLink = 'dojix://subscription/success?transaction_id=' + encodeURIComponent(txnId) + '&price_id=' + encodeURIComponent(priceId);

                            document.getElementById('checkout-state').style.display = 'none';
                            document.getElementById('success-state').style.display = 'block';
                            document.getElementById('return-link').href = deepLink;
                            if (txnId) {
                                document.getElementById('txn-display').textContent = 'Transaction: ' + txnId;
                            }

                            window.location.href = deepLink;
                        }
                    }
                });
                Paddle.Checkout.open({
                    items: [{ priceId: priceId, quantity: 1 }],
                    customData: machineId ? { machine_id: machineId } : {}
                });
            } catch(e) {
                clearTimeout(cdnTimeout);
                showError('Checkout error: ' + e.message);
            }
        }
    </script>
</body>
</html>
